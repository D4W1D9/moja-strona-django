{% extends 'base.html' %}

{% block content %}
<style>
    .danger-box { padding: 4rem 3rem; text-align: center; max-width: 550px; margin: 5rem auto; border: 1px solid rgba(255,255,255,0.9); transition: transform 0.3s; }
    .danger-box:hover { transform: scale(1.02); background: rgba(255,255,255,0.7); box-shadow: 0 20px 50px rgba(255, 59, 48, 0.1); }
    
    .danger-icon { font-size: 4.5rem; margin-bottom: 1.5rem; text-shadow: 0 4px 10px rgba(255, 59, 48, 0.2); }
    
    .btn-danger { background: #FF3B30; color: white; padding: 1rem 2rem; border: none; border-radius: 14px; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 2.5rem; width: 100%; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 4px 15px rgba(255, 59, 48, 0.3); }
    .btn-danger:hover { background: #D70015; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 59, 48, 0.4); }
    
    .btn-cancel { display: block; margin-top: 1.5rem; color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 1rem; transition: 0.2s; }
    .btn-cancel:hover { color: #1C1C1E; transform: translateY(-1px); }
</style>

<div class="glass-panel danger-box">
    <div class="danger-icon">⚠️</div>
    <h2 style="color: #1C1C1E; margin-bottom: 1rem; font-weight: 800;">Delete Movie?</h2>
    <p style="color: var(--text-muted); line-height: 1.6; font-size: 1.05rem;">
        Are you absolutely sure you want to remove <br><strong style="color: #1C1C1E;">"{{ movie.title }}"</strong><br> from your database? This action cannot be undone.
    </p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Yes, Delete Permanently</button>
    </form>
    <a href="{% url 'movie_detail' movie.id %}" class="btn-cancel">No, keep it in library</a>
</div>
{% endblock %}
