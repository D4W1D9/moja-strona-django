{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 450px; margin: 3rem auto; padding: 3rem;">
    <div style="text-align: center; margin-bottom: 2.5rem;">
        <div style="font-size: 3.5rem; margin-bottom: 1rem;">🍿</div>
        <h2 style="font-size: 2rem; color: var(--primary);">Zarejestruj się</h2>
        <p style="color: var(--text-muted); font-weight: 500;">Dołącz do MovieCollector</p>
    </div>
    
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 1.2rem;">
            <label style="font-weight: 600; display: block; margin-bottom: 0.5rem; color: var(--text);">Nazwa użytkownika</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        
        <div style="margin-bottom: 1.2rem;">
            <label style="font-weight: 600; display: block; margin-bottom: 0.5rem; color: var(--text);">Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        
        <div style="margin-bottom: 1.2rem;">
            <label style="font-weight: 600; display: block; margin-bottom: 0.5rem; color: var(--text);">Hasło</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        
        <div style="margin-bottom: 2.5rem;">
            <label style="font-weight: 600; display: block; margin-bottom: 0.5rem; color: var(--text);">Potwierdź hasło</label>
            <input type="password" name="password_confirm" class="form-control" required>
        </div>
        
        <button type="submit" class="btn" style="width: 100%; font-size: 1.1rem; padding: 1rem;">Załóż konto</button>
    </form>
    
    <div style="text-align: center; margin-top: 2rem; font-weight: 500; color: var(--text-muted);">
        Masz już konto? <a href="{% url 'login' %}" style="color: var(--primary); font-weight: 800; text-decoration: none;">Zaloguj się</a>
    </div>
</div>
{% endblock %}
