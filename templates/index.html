<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Nowoczesna Aplikacja</title>
    <style>
        :root {
            --primary: #4F46E5;
            --bg-color: #F3F4F6;
            --text-color: #1F2937;
            --card-bg: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- MENU GÓRNE --- */
        nav {
            background-color: var(--card-bg);
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 {
            color: var(--primary);
            font-size: 1.5rem;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--primary);
        }

        /* --- SEKCJA GŁÓWNA (KARTY) --- */
        main {
            flex: 1;
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .header-text {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease-in-out;
        }

        .cards-container {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        /* Fajne przejście po najechaniu myszką */
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-bottom: 4px solid var(--primary);
        }

        .card h3 {
            margin-bottom: 1rem;
            color: var(--primary);
        }

        /* --- STOPKA --- */
        footer {
            background-color: #111827;
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: auto;
        }

        /* --- ANIMACJE --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav>
        <h1>MojePortfolio</h1>
        <ul>
            <li><a href="#">O mnie</a></li>
            <li><a href="#">Projekty</a></li>
            <li><a href="#">Kontakt</a></li>
        </ul>
    </nav>

    <main>
        <div class="header-text">
            <h2>Witaj w mojej aplikacji</h2>
            <p>Zbudowano z użyciem Python, Django i nowoczesnego CSS.</p>
        </div>

        <div class="cards-container">
            {% for card in cards %}
            <div class="card">
                <h3>{{ card.title }}</h3>
                <p>{{ card.desc }}</p>
            </div>
            {% endfor %}
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Moja Aplikacja. Wszelkie prawa zastrzeżone.</p>
    </footer>

</body>
</html>
