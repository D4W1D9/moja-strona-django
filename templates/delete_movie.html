{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 550px; margin: 6rem auto; padding: 4rem 3rem; text-align: center;">
    <div style="font-size: 5rem; margin-bottom: 1.5rem; filter: drop-shadow(0 4px 10px rgba(255, 59, 48, 0.3));">⚠️</div>
    
    <h2 style="font-size: 2.2rem; margin-bottom: 1rem; color: var(--text);">Usuń Film</h2>
    
    <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2.5rem; line-height: 1.6;">
        Czy na pewno chcesz usunąć z kolekcji film <br>
        <strong style="color: var(--text); font-size: 1.3rem;">"{{ movie.title }}"</strong>?<br>
        <span style="font-size: 0.9rem; color: #FF3B30; font-weight: 600;">Tej akcji nie można cofnąć.</span>
    </p>
    
    <form method="POST">
        {% csrf_token %}
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <button type="submit" class="btn" style="background: #FF3B30; box-shadow: 0 4px 15px rgba(255, 59, 48, 0.2); padding: 1rem;">Tak, usuń film</button>
            <a href="{% url 'movie_detail' movie.id %}" class="btn" style="background: rgba(255,255,255,0.6); color: var(--text-muted); border: 1px solid rgba(0,0,0,0.05); padding: 1rem;">Anuluj, wracam do filmu</a>
        </div>
    </form>
</div>
{% endblock %}
