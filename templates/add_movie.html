{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="padding: 3rem; max-width: 800px; margin: 2rem auto;">
    <h1 style="margin-bottom: 2rem; font-size: 2.5rem;">{% if edit %}Edytuj Film{% else %}Dodaj Nowy Film{% endif %}</h1>
    
    <style>
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        .form-input { width: 100%; padding: 1rem 1.5rem; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); font-size: 1rem; transition: 0.2s; }
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }
        .form-textarea { resize: vertical; min-height: 150px; }
    </style>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-group">
            <label class="form-label" for="title">Tytuł filmu</label>
            <input type="text" name="title" id="title" class="form-input" value="{{ form.title.value|default:'' }}" required placeholder="np. Matrix">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label class="form-label" for="director">Reżyser</label>
                <input type="text" name="director" id="director" class="form-input" value="{{ form.director.value|default:'' }}" placeholder="np. Lana i Lilly Wachowski">
            </div>
            <div class="form-group">
                <label class="form-label" for="year">Rok wydania</label>
                <input type="number" name="year" id="year" class="form-input" value="{{ form.year.value|default:'' }}" placeholder="np. 1999">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="cover">Twoja okładka (Opcjonalnie)</label>
            <input type="file" name="cover" id="cover" class="form-input">
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;">Zostaw puste, aby AI wygenerowało minimalistyczny plakat na podstawie tytułu i metadanych.</p>
        </div>

        <div class="form-group">
            <label class="form-label" for="notes">Twoje notatki / Recenzja</label>
            <textarea name="notes" id="notes" class="form-input form-textarea" placeholder="Napisz coś o tym filmie...">{{ form.notes.value|default:'' }}</textarea>
        </div>

        <div style="margin-top: 3rem; display: flex; gap: 1rem; justify-content: flex-end;">
            <a href="{% url 'movie_list' %}" class="btn" style="background: rgba(0,0,0,0.05); color: var(--text);">Anuluj</a>
            <button type="submit" class="btn" style="background: var(--primary); color: white; padding: 1rem 3rem;">
                {% if edit %}Zapisz zmiany{% else %}+ Generuj plakat i dodaj film{% endif %}
            </button>
        </div>
    </form>
</div>
{% endblock %}
