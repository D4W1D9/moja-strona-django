{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 450px; margin: 4rem auto; padding: 3rem;">
    <div style="text-align: center; margin-bottom: 2.5rem;">
        <div style="font-size: 3.5rem; margin-bottom: 1rem;">🎬</div>
        <h2 style="font-size: 2rem; color: var(--primary);">Zaloguj się</h2>
        <p style="color: var(--text-muted); font-weight: 500;">Zarządzaj swoją kolekcją filmów</p>
    </div>
    
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 1.5rem;">
            <label style="font-weight: 600; display: block; margin-bottom: 0.5rem; color: var(--text);">Nazwa użytkownika</label>
            <input type="text" name="username" class="form-control" required placeholder="Wpisz login...">
        </div>
        
        <div style="margin-bottom: 2.5rem;">
            <label style="font-weight: 600; display: block; margin-bottom: 0.5rem; color: var(--text);">Hasło</label>
            <input type="password" name="password" class="form-control" required placeholder="Wpisz hasło...">
        </div>
        
        <button type="submit" class="btn" style="width: 100%; font-size: 1.1rem; padding: 1rem;">Zaloguj się</button>
    </form>
    
    <div style="text-align: center; margin-top: 2rem; font-weight: 500; color: var(--text-muted);">
        Nie masz konta? <a href="{% url 'register' %}" style="color: var(--primary); font-weight: 800; text-decoration: none;">Zarejestruj się</a>
    </div>
</div>
{% endblock %}
